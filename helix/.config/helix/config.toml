theme = "catppuccin_macchiato"

[editor]
bufferline = "always"
color-modes = true
cursorline = true
line-number = "relative"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = true

[editor.soft-wrap]
enable = true

[editor.statusline]
center = ["version-control"]
mode.insert = "INSERT"
mode.normal = "NORMAL"
mode.select = "SELECT"
